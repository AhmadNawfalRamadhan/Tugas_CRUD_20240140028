<!DOCTYPE html>
<html lang="id" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Data KTP</title>

    <link rel="stylesheet" href="/css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

<div class="wrapper">

    <header>

        <div>
            <h1>📋 Sistem Data KTP</h1>
            <p class="subtitle">Manajemen Data Penduduk</p>
        </div>

        <div class="header-tools">

            <input type="text" id="searchInput" placeholder="Cari nama...">




        </div>

    </header>

    <section class="stats">

        <div class="stat-card">
            <span>Total Data</span>
            <h2 id="totalData">0</h2>
        </div>

        <div class="stat-card">
            <span>Laki-laki</span>
            <h2 id="totalMale">0</h2>
        </div>

        <div class="stat-card">
            <span>Perempuan</span>
            <h2 id="totalFemale">0</h2>
        </div>

    </section>

    <section class="form-card">

        <h2 id="formTitle">Tambah Data</h2>

        <form id="ktpForm">

            <input type="hidden" id="ktpId">

            <div class="form-group">
                <label>Nomor KTP</label>
                <input type="text" id="nomorKtp" maxlength="16">
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="namaLengkap">
            </div>

            <div class="form-group">
                <label>Alamat</label>
                <textarea id="alamat"></textarea>
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" id="tanggalLahir">
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <select id="jenisKelamin">
                        <option value="">Pilih</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>

            </div>

            <div class="buttons">

                <button type="submit" class="btn-primary">Simpan</button>
                <button type="button" id="btnCancel" class="btn-secondary hidden">Batal</button>

            </div>

        </form>

    </section>

    <section class="table-card">

        <h2>Data KTP</h2>

        <table>

            <thead>

            <tr>
                <th>No</th>
                <th>Nomor</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th>Lahir</th>
                <th>Gender</th>
                <th>Aksi</th>
            </tr>

            </thead>

            <tbody id="ktpTableBody">

            <tr>
                <td colspan="7">Belum ada data</td>
            </tr>

            </tbody>

        </table>

    </section>

</div>

<script src="/js/app.js"></script>

</body>
</html>
